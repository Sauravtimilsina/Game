<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BrightMinds Brain Gym mini-games." />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.youtube.com https://s.ytimg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://www.youtube.com https://*.youtube.com https://*.googlevideo.com; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" />
    <title>BrightMinds Brain Gym</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
    <link rel="apple-touch-icon" href="assets/logo.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loading-screen" class="loading-screen" aria-label="Loading BrightMinds Brain Gym">
      <img src="assets/logo.svg" alt="BrightMinds Brain Gym" />
    </div>
    <main class="app-shell compact-shell">
      <header class="top-header">
        <div class="brand-lockup" aria-label="BrightMinds Brain Gym">
          <div class="logo-mark" aria-hidden="true"><img src="assets/logo.svg" alt="" /></div>
          <h1 id="app-title">BrightMinds Brain Gym</h1>
        </div>
      </header>

      <section class="control-bar" aria-label="Game setup">
        <label class="field">
          <span>Age</span>
          <select id="age-select">
            <option value="little">4-6</option>
            <option value="junior" selected>7-10</option>
            <option value="senior">11-16</option>
          </select>
        </label>
        <button id="audio-toggle" class="toggle-field audio-button" type="button" aria-pressed="false"><span class="audio-check">□</span><span>Audio</span></button>
        <div id="audio-player" class="audio-player" aria-hidden="true"></div>
        <div class="stat-pill" aria-live="polite"><span>Stars</span><strong id="total-stars">0</strong></div>
      </section>

      <section class="game-tabs" aria-label="Choose a brain game">
        <button class="tab active" data-game="memory">Memory</button>
        <button class="tab" data-game="logic">Pattern</button>
        <button class="tab" data-game="attention">Focus</button>
        <button class="tab" data-game="math">Numbers</button>
        <button class="tab" data-game="words">Words</button>
        <button class="tab" data-game="science">Science</button>
        <button class="tab" data-game="typing">Typing</button>
        <button class="tab" data-game="oddOne">Odd One</button>
        <button class="tab" data-game="colorCode">Color Code</button>
        <button class="tab" data-game="storyOrder">Story Order</button>
        <button class="tab" data-game="shapeLab">Shape Lab</button>
        <button class="tab" data-game="treasurePath">Path Quest</button>
        <button class="tab" data-game="quickCount">Quick Count</button>
        <button class="tab" data-game="xoGame">X O</button>
        <button class="tab" data-game="numberSort">Number Sort</button>
        <button class="tab nepali" data-game="nepaliLetters">क ख ग</button>
        <button class="tab nepali" data-game="nepaliWords">नेपाली शब्द</button>
        <button class="tab nepali" data-game="nepaliNumbers">नेपाली अंक</button>
      </section>

      <section class="game-status" aria-label="Game progress">
        <article><span id="current-game-label">Memory</span><strong id="virtual-level">1 / 2400</strong></article>
        <article><span>Accuracy</span><strong id="accuracy-label">100%</strong></article>
      </section>

      <section class="progress-map" aria-label="Progress map"><div id="map-nodes" class="map-nodes"></div></section>

      <section class="game-stage" aria-live="polite">
        <div class="game-header">
          <div><p class="skill-label" id="skill-label">Memory</p><h2 id="game-title">Memory Match</h2></div>
          <div class="round-stats"><span id="moves-label">Moves: 0</span><span id="score-label">Score: 0</span><span id="streak-label">Streak: 0</span><span id="combo-label">Combo: x1</span></div>
        </div>
        <p class="game-instructions" id="game-instructions"></p>
        <div id="game-board" class="game-board"></div>
        <div class="actions"><button id="new-round" class="primary-button">New round</button><button id="hint-button" class="ghost-button">Hint</button></div>
        <p class="feedback" id="feedback"></p>
        <div class="reward-toast" id="reward-toast" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
